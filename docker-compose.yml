services:
  oot:
    build: .
    container_name: oot-app
    ports:
      - "8502:8502"
    environment:
      OOT_DATA_DIR: /data
      OOT_DB_PATH: /data/oot.db
      OOT_UPLOAD_DIR: /data/uploads
      OOT_PASSWORD: ${OOT_PASSWORD:-}
    volumes:
      - ./data:/data
    restart: unless-stopped
